queries:
  - id: fault_knowledge_by_equipment_class
    required_filters:
      - equipment_class_id
    optional_filters:
      - fault_code
      - brand
      - model_family
    returns:
      - knowledge_object_id
      - equipment_class_id
      - fault_code
      - evidence
      - trust

  - id: parameter_profile_by_equipment_class
    required_filters:
      - equipment_class_id
    optional_filters:
      - parameter_category
      - parameter_name
      - brand
      - model_family
    returns:
      - knowledge_object_id
      - parameter_name
      - parameter_group
      - evidence
      - trust

  - id: maintenance_guidance_by_equipment_class
    required_filters:
      - equipment_class_id
    optional_filters:
      - task_type
      - brand
      - model_family
    returns:
      - knowledge_object_id
      - maintenance_step
      - evidence
      - trust

  - id: application_guidance_by_equipment_class
    required_filters:
      - equipment_class_id
    optional_filters:
      - application_type
      - brand
      - model_family
    returns:
      - knowledge_object_id
      - application_type
      - guidance
      - evidence
      - trust

  - id: operational_guidance_by_equipment_class
    required_filters:
      - equipment_class_id
    optional_filters:
      - guidance_type
      - brand
      - model_family
    returns:
      - knowledge_object_id
      - knowledge_object_type
      - guidance
      - evidence
      - trust
