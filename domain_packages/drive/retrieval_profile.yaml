retrieval:
  chunk_type_boost:
    fault_code_block: 1.5
    parameter_block: 1.4
    procedure_block: 1.2
    table_block: 1.3

  document_type_boost:
    fault_code_reference: 1.5
    parameter_guide: 1.4
    technical_manual: 1.2

  brand_boost:
    ABB: 1.3
    Siemens: 1.2

  min_confidence: 0.3
  default_limit: 20

  default_filters:
    review_status: ["approved", "pending"]
    trust_level: ["L1", "L2", "L3"]
