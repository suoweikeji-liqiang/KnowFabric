retrieval:
  chunk_type_boost:
    fault_code_block: 1.5
    parameter_block: 1.3
    procedure_block: 1.2
    table_block: 1.1

  document_type_boost:
    fault_code_reference: 1.4
    parameter_manual: 1.3
    technical_manual: 1.2

  brand_boost:
    Carrier: 1.2
    Trane: 1.2
    York: 1.1

  min_confidence: 0.3
  default_limit: 20

  default_filters:
    review_status: ["approved", "pending"]
    trust_level: ["L1", "L2", "L3"]
